<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
    href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet"
  />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    <title>satellite viewer mockup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    
    <div id="cesiumContainer"></div>
    <div class="container-fluid overlay-container position-fixed top-0 start-0 w-100 h-100 p-3 text-white d-flex flex-column">
        <!-- Top Row -->
        <div class="row align-items-center">
            <div class="col-auto d-flex align-items-center">
                <!-- <img src="{{ url_for('static', filename='assets/icon.svg') }}" height="36" class="me-2"> -->
                <span class="fw-bold fs-4">Satellite Tracker</span>
            </div>
            <div class="col-md-2 ms-auto ps-0 text-white">
                <input class="form-control bg-dark text-white border-0 " type="search" placeholder="Search for a satellite...">
            </div>
            <div class="col-auto ps-0">
                <button class="btn bg-dark text-white" type="button">
                    <i class="bi bi-filter"></i>
                </button>
            </div>
        </div>

        <div class="row mt-3 align-items-center">
            <div class="col-md-2 ms-auto">
                {% include 'satellite_info_card.html' %}
            </div>
        </div>

        <div class="flex-grow-1"></div>

        <div class="row mt-1 align-items-center">
            <div class="col-md-3 align-self-end">
                <button class="btn bg-dark text-white btn-lg" type="button">
                    <i class="bi bi-pause"></i>
                </button>
            </div>

            <div class="col-auto w-auto ms-auto">
                <div class="card bg-dark text-white" id="sat-colour-key">
                    <div class="card-body px-3">
                        <ul class="list-unstyled mb-0">
                            <li><span class="badge me-1" style="background-color: #00FFFF">&nbsp;</span>Starlink</li>
                            <li><span class="badge me-1" style="background-color: #FFA500">&nbsp;</span>OneWeb</li>
                            <li><span class="badge me-1" style="background-color: #008000">&nbsp;</span>Iridium</li>
                            <li><span class="badge me-1" style="background-color: #FFFF00">&nbsp;</span>GPS</li>
                            <li><span class="badge me-1" style="background-color: #808080">&nbsp;</span>Other</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    
    <script src="https://cdn.jsdelivr.net/npm/cesium@1.114.0/Build/Cesium/Cesium.js"></script>
    <script>
        Cesium.Ion.defaultAccessToken = "{{ CESIUM_TOKEN }}";
    </script>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script>
        const socket = io("http://127.0.0.1:5000");
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}" type="module"></script>
</body>
</html>
